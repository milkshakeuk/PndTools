name: PndTools
version: 1.0.0
description: APM project for PndTools
author: Jake Aitchison
targets:
  - claude
  - copilot
dependencies:
  apm:
  - dgalarza/claude-code-workflows/plugins/conventional-commits
  - upstash/context7/skills/context7-mcp
  mcp:
  - name: dotnet
    registry: false
    transport: stdio
    command: dnx
    args:
    - Community.Mcp.DotNet@1.*
    - --yes
  - name: context7
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@upstash/context7-mcp@latest'
includes: auto
scripts: {}
