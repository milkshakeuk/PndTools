name: Feature request
description: Suggest a new capability or improvement.
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, please check that no existing request covers the same idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that is currently difficult or impossible?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the API or behaviour you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you have thought about and why you ruled them out.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, or anything else that may be relevant.
