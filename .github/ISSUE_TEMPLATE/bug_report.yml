name: Bug report
description: Report something that is not working as expected.
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, please check that no existing report covers the same problem.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET version
      placeholder: e.g. 10.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What did you expect to happen and what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code sample or sequence of steps that reliably triggers the bug.
      render: csharp
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Stack traces, related issues, or anything else that may be relevant.
