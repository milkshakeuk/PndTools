name: Docs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          dotnet-quality: ga
          cache: true
          cache-dependency-path: "**/*.csproj"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Generate coverage report
        run: >
          dotnet reportgenerator
          -reports:coverage/**/coverage.cobertura.xml
          -targetdir:docs/coverage
          -reporttypes:MarkdownSummaryGithub

      - name: Build benchmarks
        run: >
          dotnet build test/PndTools.Benchmarks/PndTools.Benchmarks.csproj
          --configuration Release

      - name: Run benchmarks
        run: >
          dotnet run
          --project test/PndTools.Benchmarks/PndTools.Benchmarks.csproj
          --configuration Release
          --no-build
          -- --filter '*' --artifacts BenchmarkDotNet.Artifacts

      - name: Copy benchmark results
        run: cp BenchmarkDotNet.Artifacts/results/*-report-github.md docs/benchmarks/

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
