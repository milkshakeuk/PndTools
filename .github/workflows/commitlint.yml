name: Commitlint

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  commitlint:
    runs-on: ubuntu-latest
    env:
      IS_MERGIFY_QUEUE: ${{ startsWith(github.head_ref, 'mergify/') && github.event.pull_request.user.login == 'mergify[bot]' }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint commits
        if: env.IS_MERGIFY_QUEUE != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Lint commits (skip mergify[bot] commits)
        if: env.IS_MERGIFY_QUEUE == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git log --format="%H %an" "$BASE_SHA".."$HEAD_SHA" | \
          while IFS= read -r line; do
            sha="${line%% *}"
            author="${line#* }"
            if [ "$author" != "mergify[bot]" ]; then
              npx commitlint --from "${sha}^" --to "$sha" --verbose
            fi
          done
