name: Dependabot NuGet Fix

on:
  workflow_dispatch: # disabled — lock files removed; re-enable if lock files are reintroduced

permissions: {}

jobs:
  fix:
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/nuget/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Check commit message
        id: message
        run: |
          full=$(git log -1 --format=%B)
          subject=$(printf '%s\n' "$full" | head -1)

          if printf '%s\n' "$subject" | grep -qE '^build(\(deps(-dev)?\))?: bump'; then
            needs_fix=false
            fixed="$full"
          elif printf '%s\n' "$subject" | grep -qE '^build: Bump'; then
            needs_fix=true
            fixed=$(printf '%s\n' "$full" | sed '1s/^build: Bump/build(deps): bump/')
          elif printf '%s\n' "$subject" | grep -qE '^Bump'; then
            needs_fix=true
            fixed=$(printf '%s\n' "$full" | sed '1s/^Bump/build(deps): bump/')
          else
            needs_fix=false
            fixed="$full"
          fi

          echo "needs_fix=${needs_fix}" >> "$GITHUB_OUTPUT"
          echo "subject=$(printf '%s\n' "$fixed" | head -1)" >> "$GITHUB_OUTPUT"
          {
            echo "full<<COMMIT_MSG_EOF"
            printf '%s\n' "$fixed"
            echo "COMMIT_MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Amend commit message via API
        if: steps.message.outputs.needs_fix == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MESSAGE: ${{ steps.message.outputs.full }}
          BRANCH: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          PARENT_SHA=$(git rev-parse HEAD^)
          TREE_SHA=$(gh api "repos/${REPO}/git/commits/${CURRENT_SHA}" --jq '.tree.sha')

          AUTHOR_NAME=$(git log -1 --format='%an')
          AUTHOR_EMAIL=$(git log -1 --format='%ae')
          AUTHOR_DATE=$(git log -1 --format='%aI')

          NEW_COMMIT_SHA=$(jq -n \
            --arg message "$MESSAGE" \
            --arg tree "$TREE_SHA" \
            --arg parent "$PARENT_SHA" \
            --arg author_name "$AUTHOR_NAME" \
            --arg author_email "$AUTHOR_EMAIL" \
            --arg author_date "$AUTHOR_DATE" \
            '{message: $message, tree: $tree, parents: [$parent],
              author: {name: $author_name, email: $author_email, date: $author_date}}' \
            | gh api "repos/${REPO}/git/commits" --input - --jq '.sha')

          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            -X PATCH \
            -f "sha=${NEW_COMMIT_SHA}" \
            -F force=true

      - name: Update PR title
        if: steps.message.outputs.needs_fix == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SUBJECT: ${{ steps.message.outputs.subject }}
        run: gh pr edit ${{ github.event.pull_request.number }} --title "$SUBJECT"
