name: Dependabot NuGet Fix

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  fix:
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/nuget/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.MILKSHAKE_WRITER_BOT_CLIENT_ID }}
          private-key: ${{ secrets.MILSHAKE_WRITER_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Check commit message
        id: message
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          full=$(git log -1 --format=%B)
          subject=$(printf '%s\n' "$full" | head -1)

          if printf '%s\n' "$subject" | grep -qE '^build(\(deps(-dev)?\))?: bump'; then
            message_fix=false
            fixed="$full"
          elif printf '%s\n' "$subject" | grep -qE '^build: Bump'; then
            message_fix=true
            fixed=$(printf '%s\n' "$full" | sed '1s/^build: Bump/build(deps): bump/')
          elif printf '%s\n' "$subject" | grep -qE '^Bump'; then
            message_fix=true
            fixed=$(printf '%s\n' "$full" | sed '1s/^Bump/build(deps): bump/')
          else
            message_fix=false
            fixed="$full"
          fi

          CURRENT_SHA=$(git rev-parse HEAD)
          signed=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${CURRENT_SHA}" --jq '.verification.verified')

          if [ "$message_fix" = "true" ] || [ "$signed" = "false" ]; then
            needs_fix=true
          else
            needs_fix=false
          fi

          echo "needs_fix=${needs_fix}" >> "$GITHUB_OUTPUT"
          echo "message_fix=${message_fix}" >> "$GITHUB_OUTPUT"
          echo "subject=$(printf '%s\n' "$fixed" | head -1)" >> "$GITHUB_OUTPUT"
          {
            echo "full<<COMMIT_MSG_EOF"
            printf '%s\n' "$fixed"
            echo "COMMIT_MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Amend commit and sign via API
        if: steps.message.outputs.needs_fix == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MESSAGE: ${{ steps.message.outputs.full }}
          BRANCH: ${{ github.head_ref }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          PARENT_SHA=$(git rev-parse HEAD^)
          TREE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${CURRENT_SHA}" --jq '.tree.sha')

          NEW_COMMIT_SHA=$(jq -n \
            --arg message "$MESSAGE" \
            --arg tree "$TREE_SHA" \
            --arg parent "$PARENT_SHA" \
            '{message: $message, tree: $tree, parents: [$parent]}' \
            | gh api "repos/${GITHUB_REPOSITORY}/git/commits" --input - --jq '.sha')

          gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}" \
            -X PATCH \
            -f "sha=${NEW_COMMIT_SHA}" \
            -F force=true

      - name: Update PR title
        if: steps.message.outputs.message_fix == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SUBJECT: ${{ steps.message.outputs.subject }}
        run: gh pr edit ${{ github.event.pull_request.number }} --title "$SUBJECT"
