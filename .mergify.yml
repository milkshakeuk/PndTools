queue_rules:

  # Standard PRs and Dependabot major-version PRs.
  # No batching — each PR merges individually once conditions are met.
  - name: standard
    merge_method: fast-forward
    max_checks_retries: 3
    merge_conditions:
      - base = main
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — NuGet ecosystem.
  - name: nuget-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    merge_conditions:
      - base = main
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — npm ecosystem.
  - name: npm-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    merge_conditions:
      - base = main
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — GitHub Actions ecosystem.
  - name: actions-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    merge_conditions:
      - base = main
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

pull_request_rules:

  # Standard (non-Dependabot) PRs — enqueue when checks pass and codeowner has approved.
  - name: merge standard PRs
    conditions:
      - base = main
      - -author = dependabot[bot]
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: standard

  # Dependabot major-version PRs — same gate as standard PRs.
  # IMPORTANT: major rule MUST appear before minor/patch rules so that a PR carrying
  # both semver-major and semver-minor labels is correctly treated as major (FR-006).
  - name: merge dependabot major updates
    conditions:
      - base = main
      - author = dependabot[bot]
      - label = version-update:semver-major
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: standard

  # Dependabot PRs with no semver label — catch-all, treat as major per FR-006.
  # Appears after major rule and before minor/patch rules.
  - name: merge dependabot unlabelled (treat as major)
    conditions:
      - base = main
      - author = dependabot[bot]
      - -label = version-update:semver-major
      - -label = version-update:semver-minor
      - -label = version-update:semver-patch
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: standard

  # Dependabot minor/patch — NuGet. Auto-enqueue; no approval required.
  - name: auto-merge dependabot nuget minor/patch
    conditions:
      - base = main
      - author = dependabot[bot]
      - label ~= ^version-update:semver-(minor|patch)$
      - label = nuget
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: nuget-deps

  # Dependabot minor/patch — npm. Auto-enqueue; no approval required.
  - name: auto-merge dependabot npm minor/patch
    conditions:
      - base = main
      - author = dependabot[bot]
      - label ~= ^version-update:semver-(minor|patch)$
      - label = npm
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: npm-deps

  # Dependabot minor/patch — GitHub Actions. Auto-enqueue; no approval required.
  - name: auto-merge dependabot actions minor/patch
    conditions:
      - base = main
      - author = dependabot[bot]
      - label ~= ^version-update:semver-(minor|patch)$
      - label = github-actions
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: actions-deps

  # Failure notification — post a comment when a PR is dequeued for any terminal reason.
  - name: notify on merge failure
    conditions:
      - base = main
      - queue-dequeue-reason ~= ^(checks-timeout|merge-failed|pr-dequeued)$
    actions:
      comment:
        message: |
          Mergify was unable to merge this PR after exhausting retries.
          Please review the workflow run logs and re-enqueue once the issue is resolved.
      label:
        add:
          - merge-failed
