merge_protections:

  # Gates Dependabot major-version PRs on codeowner approval before Mergify
  # can merge them. Minor/patch PRs are excluded — they merge automatically
  # once CI passes.
  - name: codeowner approval
    if:
      - base = main
      - or:
          - -author = dependabot[bot]
          - dependabot-update-type = version-update:semver-major
    success_conditions:
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"

merge_protections_settings:
  reporting_method: check-runs
  auto_merge_conditions: true

queue_rules:

  # Standard (non-Dependabot) PRs — queued to serialise merges and enforce CI + approval.
  - name: standard
    merge_method: fast-forward
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    queue_conditions:
      - base = main
      - -author = dependabot[bot]

pull_request_rules:

  # Standard PRs require CI and codeowner approval before queuing.
  - name: queue standard PRs
    conditions:
      - base = main
      - -author = dependabot[bot]
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
    actions:
      queue:
        name: standard

  # Dependabot PRs merge directly once CI passes — no queue, no speculative branch.
  # Major PRs are blocked by the codeowner approval merge_protection until approved.
  # Dependabot keeps its own branches up to date; signed commits are preserved.
  - name: auto-merge Dependabot PRs
    conditions:
      - base = main
      - author = dependabot[bot]
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      merge:
        method: fast-forward

  # Keep Dependabot PR branches up to date with main.
  - name: rebase Dependabot PRs when outdated
    conditions:
      - base = main
      - author = dependabot[bot]
      - -conflict
      - -draft
    actions:
      update:

  # Failure notification — post a comment when a standard PR is dequeued for any terminal reason.
  - name: notify on merge failure
    conditions:
      - base = main
      - queue-dequeue-reason ~= ^(checks-timeout|merge-failed|pr-dequeued)$
    actions:
      comment:
        message: |
          Mergify was unable to merge this PR after exhausting retries.
          Please review the workflow run logs and re-enqueue once the issue is resolved.
      label:
        add:
          - merge-failed
