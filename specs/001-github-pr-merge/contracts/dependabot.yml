# Contract: .github/dependabot.yml
#
# This file documents the intended Dependabot configuration.
# It is a reference contract, not the deployed file.
# The deployed file lives at: /.github/dependabot.yml
#
# open-pull-requests-limit controls how many open Dependabot PRs exist per
# ecosystem at once. PRs are merged individually via fast-forward — there is
# no batching.

version: 2

updates:

  # NuGet (.NET) dependencies
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - nuget                        # required for Mergify nuget-deps queue routing

  # npm (Node.js devDependencies)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - npm                          # required for Mergify npm-deps queue routing

  # GitHub Actions workflow dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - github-actions               # required for Mergify actions-deps queue routing
