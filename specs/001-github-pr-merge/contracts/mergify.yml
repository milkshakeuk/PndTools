# Contract: .mergify.yml
#
# This file documents the intended Mergify configuration structure.
# It is a reference contract, not the deployed file.
# The deployed file lives at the repository root: /.mergify.yml
#
# Ecosystem labels applied by Dependabot:
#   - "nuget"          (declared via labels: in .github/dependabot.yml — NOT added by default)
#   - "npm"
#   - "github-actions"
# These labels MUST be declared in .github/dependabot.yml or the ecosystem queue routing will never fire.
#
# Dependabot NuGet commits are amended by dependabot-nuget-fix.yml before CI runs. This workflow
# replaces the commit via the GitHub REST API using a GitHub App token (milkshake-writer-bot),
# which signs the new commit automatically. The App token is required for the ref update so that
# the pull_request: synchronize event fires and re-triggers CI — github.token force pushes do not
# fire this event.
#
# Automatic queueing is handled by pull_request_rules queue actions. Mergify evaluates each rule's
# conditions and automatically queues the PR when they all pass — no manual @Mergifyio queue command
# is needed.
#
# Mergify is added as a bypass actor (bypass_mode: always) on the Review Gates GitHub ruleset.
# This replaces the previous merge_bot_account + branch_protection_injection_mode: none approach.
# All queues use the default branch_protection_injection_mode (queue), which injects ruleset
# conditions into queue evaluation. For Dependabot PRs, the Review Gates ruleset does not inject
# approval conditions because Dependabot has bypass_mode: pull_request on that ruleset.
#
# dependabot-update-type is only used in the codeowner approval merge_protection (where it is
# documented). It is NOT used in queue_conditions, merge_conditions, or pull_request_rules conditions
# — routing is done purely by author and ecosystem label.
#
# The codeowner approval merge_protection blocks the merge of major Dependabot PRs after they are
# queued, until a codeowner approves. Minor/patch PRs are not subject to this protection and merge
# automatically once CI passes.
#
# update_method: rebase on all queue rules keeps Mergify's temporary queue branch linear and
# satisfies FR-010 — Mergify rebases every PR against the current tip of main before merging.
# The GitHub "Require branches to be up to date" setting is therefore disabled; Mergify owns
# this guarantee via the queue.
#
# max_parallel_checks: 1 disables speculative checking. Without this, Mergify creates cumulative
# temporary branches (PR#1 + PR#2, PR#1 + PR#2 + PR#3, etc.) which contain Mergify-authored
# merge commits that fail commitlint. Setting to 1 means each PR is tested independently.
#
# max_checks_retries: controls how many times Mergify retries a failing CI check before
# dequeuing the PR (FR-011b circuit breaker). Recommended starting value: 3.
#
# Review Gates ruleset bypass actors:
#   - Mergify GitHub App (ID 10562)  — bypass_mode: always (needed for direct fast-forward push to main)
#   - Dependabot (ID 29110)          — bypass_mode: pull_request (prevents approval injection on Dependabot PRs)

merge_protections:

  # Gates Dependabot major-version PRs on codeowner approval before Mergify
  # can merge them. Minor/patch PRs are excluded — they merge automatically
  # once CI passes.
  #
  # CI checks and approval for standard PRs are enforced by GitHub rulesets
  # and injected automatically into pull_request_rules conditions; no
  # separate CI quality gates merge_protection is needed.
  - name: codeowner approval
    if:
      - base = main
      - or:
          - -author = dependabot[bot]
          - dependabot-update-type = version-update:semver-major
    success_conditions:
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"

merge_protections_settings:
  reporting_method: check-runs
  auto_merge_conditions: true

merge_queue:
  max_parallel_checks: 1

queue_rules:

  # Standard (non-Dependabot) PRs — no batching, no ecosystem routing.
  # CI checks and approval are enforced by GitHub rulesets; no merge_conditions needed.
  - name: standard
    merge_method: fast-forward
    update_method: rebase
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    queue_conditions:
      - base = main
      - -author = dependabot[bot]

  # Dependabot NuGet updates — all semver levels.
  # Major updates are blocked by the codeowner approval merge_protection until a codeowner approves.
  - name: nuget-deps
    merge_method: fast-forward
    update_method: rebase
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    queue_conditions:
      - base = main
      - author = dependabot[bot]
      - label = nuget

  # Dependabot npm updates — all semver levels.
  - name: npm-deps
    merge_method: fast-forward
    update_method: rebase
    max_checks_retries: 3
    queue_conditions:
      - base = main
      - author = dependabot[bot]
      - label = npm

  # Dependabot GitHub Actions updates — all semver levels.
  - name: actions-deps
    merge_method: fast-forward
    update_method: rebase
    max_checks_retries: 3
    queue_conditions:
      - base = main
      - author = dependabot[bot]
      - label = github-actions

pull_request_rules:

  # Explicit CI checks are listed here rather than relying on ruleset injection,
  # which also injects the Review Gates approval requirement and blocks Dependabot
  # PRs from queuing. GitHub rulesets still enforce these at the push layer.

  # Standard PRs require CI and codeowner approval before queuing.
  - name: queue standard PRs
    conditions:
      - base = main
      - -author = dependabot[bot]
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
    actions:
      queue:
        name: standard

  # Dependabot minor/patch PRs queue automatically once CI passes.
  # Major PRs also queue here but the codeowner approval merge_protection
  # blocks the merge until a codeowner approves.
  - name: queue Dependabot NuGet PRs
    conditions:
      - base = main
      - author = dependabot[bot]
      - label = nuget
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: nuget-deps

  - name: queue Dependabot npm PRs
    conditions:
      - base = main
      - author = dependabot[bot]
      - label = npm
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: npm-deps

  - name: queue Dependabot Actions PRs
    conditions:
      - base = main
      - author = dependabot[bot]
      - label = github-actions
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: actions-deps

  # Failure notification — post a comment when a PR is dequeued for any terminal reason.
  - name: notify on merge failure
    conditions:
      - base = main
      - queue-dequeue-reason ~= ^(checks-timeout|merge-failed|pr-dequeued)$
    actions:
      comment:
        message: |
          Mergify was unable to merge this PR after exhausting retries.
          Please review the workflow run logs and re-enqueue once the issue is resolved.
      label:
        add:
          - merge-failed
