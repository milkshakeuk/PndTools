# Contract: .mergify.yml
#
# This file documents the intended Mergify configuration structure.
# It is a reference contract, not the deployed file.
# The deployed file lives at the repository root: /.mergify.yml
#
# Mergify handles only standard (non-Dependabot) PRs. Dependabot PRs are
# handled entirely by the dependabot-auto-merge.yml GitHub Actions workflow,
# which polls CI, auto-approves minor/patch updates, gates major updates on
# admin approval, and fast-forward pushes directly to main.
#
# Mergify is added as a bypass actor (bypass_mode: always) on the Review Gates
# GitHub ruleset. This allows Mergify to fast-forward push to main without the
# push being blocked by the required_approving_review_count ruleset rule.
# All review gate requirements are validated by Mergify's queue conditions before
# the push is attempted.
#
# No update_method is set on the standard queue. Mergify will refuse to
# fast-forward a PR branch that has fallen behind main. Standard PR authors are
# responsible for keeping their branches current by rebasing manually before the
# queue processes them. This preserves GPG signatures — no rebase by Mergify means
# no commit rewriting and no signature invalidation (FR-003b).
#
# max_checks_retries controls how many times Mergify retries a failing CI check
# before dequeuing the PR (FR-011b circuit breaker). Recommended starting value: 3.
#
# The codeowner approval merge_protection produces the Mergify Merge Protections
# check run required by the Mergify Merge Protection GitHub ruleset. Without this
# block the check run is never created and the ruleset blocks all merges.
#
# Review Gates ruleset bypass actors:
#   - Mergify GitHub App (ID 10562)  — bypass_mode: always (needed for fast-forward push to main)
#   - Dependabot (ID 29110)          — bypass_mode: pull_request (prevents approval injection on Dependabot PRs)

merge_protections:

  # Gates standard PRs on codeowner approval. Produces the Mergify Merge Protections
  # check run required by the Mergify Merge Protection GitHub ruleset.
  - name: codeowner approval
    if:
      - base = main
      - -author = dependabot[bot]
    success_conditions:
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"

merge_protections_settings:
  reporting_method: check-runs
  auto_merge_conditions: true

queue_rules:

  # Standard (non-Dependabot) PRs — queued to serialise fast-forward merges.
  - name: standard
    merge_method: fast-forward
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    queue_conditions:
      - base = main
      - -author = dependabot[bot]

pull_request_rules:

  # Standard PRs require CI and codeowner approval before queuing.
  - name: queue standard PRs
    conditions:
      - base = main
      - -author = dependabot[bot]
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
    actions:
      queue:
        name: standard

  # Failure notification — post a comment when a standard PR is dequeued for any terminal reason.
  - name: notify on merge failure
    conditions:
      - base = main
      - queue-dequeue-reason ~= ^(checks-timeout|merge-failed|pr-dequeued)$
    actions:
      comment:
        message: |
          Mergify was unable to merge this PR after exhausting retries.
          Please review the workflow run logs and re-enqueue once the issue is resolved.
      label:
        add:
          - merge-failed
