# Contract: .mergify.yml
#
# This file documents the intended Mergify configuration structure.
# It is a reference contract, not the deployed file.
# The deployed file lives at the repository root: /.mergify.yml
#
# Ecosystem labels applied by Dependabot:
#   - "nuget"          (declared via labels: in .github/dependabot.yml — NOT added by default)
#   - "npm"
#   - "github-actions"
# These labels MUST be declared in .github/dependabot.yml or the ecosystem queue routing will never fire.
#
# The batch_size value below is a recommended default.
# It MUST be adjusted to match the open-pull-requests-limit in .github/dependabot.yml.
#
# max_checks_retries: controls how many times Mergify retries a failing CI check before
# dequeuing the PR (FR-011b circuit breaker). Recommended starting value: 3.

queue_rules:

  # Standard PRs and Dependabot major-version PRs.
  # No batching — each PR merges individually once conditions are met.
  - name: standard
    merge_method: fast-forward
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    merge_conditions:
      - base = main
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — NuGet ecosystem.
  - name: nuget-deps
    merge_method: fast-forward
    batch_size: 10                   # configurable; keep <= dependabot open-pull-requests-limit
    batch_max_wait_time: 30 min
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    merge_conditions:
      - base = main
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — npm ecosystem.
  - name: npm-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    merge_conditions:
      - base = main
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — GitHub Actions ecosystem.
  - name: actions-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    merge_conditions:
      - base = main
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

pull_request_rules:

  # Standard (non-Dependabot) PRs — enqueue when checks pass and codeowner has approved.
  - name: merge standard PRs
    conditions:
      - base = main
      - -author = dependabot[bot]
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: standard

  # Dependabot major-version PRs — same gate as standard PRs.
  # IMPORTANT: major rules MUST appear before minor/patch rules so that a PR carrying
  # both semver-major and semver-minor labels (grouped update) is correctly treated as
  # major. Mergify evaluates pull_request_rules in order and applies the first match.
  - name: merge dependabot major updates
    conditions:
      - base = main
      - author = dependabot[bot]
      - label = version-update:semver-major
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: standard

  # Dependabot minor/patch — NuGet. Auto-enqueue; no approval required.
  # Only reached if no semver-major label is present (major rule above takes precedence).
  - name: auto-merge dependabot nuget minor/patch
    conditions:
      - base = main
      - author = dependabot[bot]
      - label ~= ^version-update:semver-(minor|patch)$
      - label = nuget
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: nuget-deps

  # Dependabot minor/patch — npm. Auto-enqueue; no approval required.
  - name: auto-merge dependabot npm minor/patch
    conditions:
      - base = main
      - author = dependabot[bot]
      - label ~= ^version-update:semver-(minor|patch)$
      - label = npm
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: npm-deps

  # Dependabot minor/patch — GitHub Actions. Auto-enqueue; no approval required.
  - name: auto-merge dependabot actions minor/patch
    conditions:
      - base = main
      - author = dependabot[bot]
      - label ~= ^version-update:semver-(minor|patch)$
      - label = github-actions
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: actions-deps

  # Dependabot PRs with no semver label — catch-all, treat as major per FR-006; require codeowner approval.
  # MUST appear after the major rule and before any minor/patch rules.
  - name: merge dependabot unlabelled (treat as major)
    conditions:
      - base = main
      - author = dependabot[bot]
      - -label = version-update:semver-major
      - -label = version-update:semver-minor
      - -label = version-update:semver-patch
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)
    actions:
      queue:
        name: standard

  # Failure notification — post a comment when a PR is dequeued for any terminal reason.
  - name: notify on merge failure
    conditions:
      - base = main
      - queue-dequeue-reason ~= ^(checks-timeout|merge-failed|pr-dequeued)$
    actions:
      comment:
        message: |
          Mergify was unable to merge this PR after exhausting retries.
          Please review the workflow run logs and re-enqueue once the issue is resolved.
      label:
        add:
          - merge-failed
