# Contract: .mergify.yml
#
# This file documents the intended Mergify configuration structure.
# It is a reference contract, not the deployed file.
# The deployed file lives at the repository root: /.mergify.yml
#
# Ecosystem labels applied by Dependabot:
#   - "nuget"          (declared via labels: in .github/dependabot.yml — NOT added by default)
#   - "npm"
#   - "github-actions"
# These labels MUST be declared in .github/dependabot.yml or the ecosystem queue routing will never fire.
#
# Routing uses dependabot-update-type (a Mergify-native attribute that reads Dependabot PR metadata
# directly), not label-based semver matching. This eliminates the need for a catch-all unlabelled rule
# and is more reliable than depending on labels being correctly applied.
#
# Dependabot auto-rebase is disabled in .github/dependabot.yml across all ecosystems. Without this,
# Dependabot rewrites commit SHAs on rebase, dequeuing the PR from Mergify and forcing a full re-check.
#
# merge_protections creates a visible PR status check. auto_merge_conditions: true handles automatic
# queueing once all protections pass — no explicit queue action in pull_request_rules is needed.
#
# The batch_size value below is a recommended default.
# It MUST be adjusted to match the open-pull-requests-limit in .github/dependabot.yml.
#
# max_checks_retries: controls how many times Mergify retries a failing CI check before
# dequeuing the PR (FR-011b circuit breaker). Recommended starting value: 3.

merge_protections:

  # All PRs targeting main must pass CI quality gates and security scanning.
  - name: CI quality gates
    if:
      - base = main
    success_conditions:
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Standard PRs and Dependabot major PRs additionally require codeowner approval.
  # Dependabot minor/patch PRs are excluded — they auto-merge without human review.
  - name: codeowner approval
    if:
      - base = main
      - or:
          - -author = dependabot[bot]
          - dependabot-update-type = version-update:semver-major
    success_conditions:
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"

merge_protections_settings:
  auto_merge_conditions: true

queue_rules:

  # Standard PRs and Dependabot major PRs.
  # No batching — each PR merges individually once conditions are met.
  - name: standard
    merge_method: fast-forward
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    queue_conditions:
      - base = main
      - or:
          - -author = dependabot[bot]
          - dependabot-update-type = version-update:semver-major
    merge_conditions:
      - "#approved-reviews-by >= 1"
      - "#changes-requested-reviews-by = 0"
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — NuGet ecosystem.
  - name: nuget-deps
    merge_method: fast-forward
    batch_size: 10                   # configurable; keep <= dependabot open-pull-requests-limit
    batch_max_wait_time: 30 min
    max_checks_retries: 3            # configurable; FR-011b circuit breaker
    queue_conditions:
      - base = main
      - author = dependabot[bot]
      - dependabot-update-type != version-update:semver-major
      - label = nuget
    merge_conditions:
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — npm ecosystem.
  - name: npm-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    queue_conditions:
      - base = main
      - author = dependabot[bot]
      - dependabot-update-type != version-update:semver-major
      - label = npm
    merge_conditions:
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

  # Dependabot minor/patch — GitHub Actions ecosystem.
  - name: actions-deps
    merge_method: fast-forward
    batch_size: 10
    batch_max_wait_time: 30 min
    max_checks_retries: 3
    queue_conditions:
      - base = main
      - author = dependabot[bot]
      - dependabot-update-type != version-update:semver-major
      - label = github-actions
    merge_conditions:
      - check-success = commitlint
      - check-success = lint
      - check-success = dependency-review
      - check-success = build
      - check-success = Analyze (csharp)

pull_request_rules:

  # Failure notification — post a comment when a PR is dequeued for any terminal reason.
  - name: notify on merge failure
    conditions:
      - base = main
      - queue-dequeue-reason ~= ^(checks-timeout|merge-failed|pr-dequeued)$
    actions:
      comment:
        message: |
          Mergify was unable to merge this PR after exhausting retries.
          Please review the workflow run logs and re-enqueue once the issue is resolved.
      label:
        add:
          - merge-failed
